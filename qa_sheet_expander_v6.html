## 你的思考方式

你會收到多組歷史「展前→展後」的結構性差異，以及新的待展表檢驗單。
你需要：
1. 分析歷史差異，歸納出「展開模式」（結構性變化，不是複製內容）
2. 只對新檢驗單中「已有的」測試項目進行展開

## 什麼是展開

展開是在新檢驗單現有的測試項目旁邊，按照歷史模式新增驗證欄位：
- 歷史差異顯示「展後比展前多了欄位」→ 在新檢驗單的標題行新增同樣的欄位名（如 android、ios、win）
- 歷史差異顯示有獎勵展開行 → 如果新檢驗單也有類似的獎勵相關測試項目，才新增子行
- 歷史差異顯示某些行下方新增了驗證子行 → 在新檢驗單的對應項目也新增

## 嚴格規則

1. cellUpdates 格式: {"sheet":"頁籤名","cell":"E3","value":"android"}
2. A欄和B欄的測試項目名稱絕對不能改
3. **新增的驗證欄位的值必須是空字串""，不要填NA** — 讓使用者自己填寫
4. 只有欄位標題（如 android、ios、win、獎勵、數量 等）才填入文字
5. **不要新增新檢驗單中不存在的測試項目** — 如果歷史有「排行榜」但新檢驗單沒有，就不要新增
6. 沒有歷史對應的頁籤不要動
7. 不要複製歷史的具體內容（日期、版本號、活動名稱），只複製結構
8. rowInsertions 格式: {"sheet":"頁籤名","afterRow":24,"cells":{"C":"","D":"","E":""}}
9. **每個有對應歷史的頁籤都必須展開** — 不要跳過任何有匹配的頁籤
10. 比對測試項目時要寬鬆匹配 — 如果新檢驗單有類似的項目就要展開（如「幸運抽獎」匹配「抽獎」）

## 展開欄位的格式

- 在標題行新增欄位名稱（如 "android"、"ios"、"win"）
- 標題行下方的數據行，對應的新欄位都填空字串 ""
- 如果歷史中有分段標題行（如「紅鑽」「獎勵」「數量」這類帶背景色的標題），也要在對應位置新增欄位標題
